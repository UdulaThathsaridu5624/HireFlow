name: SonarCloud - CV Service
on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu
          cache: maven
      - name: Build and test
        run: mvn -B verify
        working-directory: BackendServices/cv-service
      - name: SonarCloud Scan
        run: mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=UdulaThathsaridu5624_HireFlow
        working-directory: BackendServices/cv-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
