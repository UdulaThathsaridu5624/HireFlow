name: SonarCloud - Profile Service

on:
  push:
    branches: [main, develop]
    paths:
      - "BackendServices/Profile-Service/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "BackendServices/Profile-Service/**"

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install dependencies and Run tests
        run: mvn -B clean verify
        working-directory: BackendServices/Profile-Service

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=UdulaThathsaridu5624_HireFlow_ProfileService 
          -Dsonar.organization=udulathathsaridu5624
        working-directory: BackendServices/Profile-Service
