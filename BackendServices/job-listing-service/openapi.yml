openapi: 3.0.0
info:
  title: HireFlow - Job Listing Service
  description: |
    Microservice for managing job postings and candidate applications within the HireFlow platform.
    
    ## User Roles
    - **Employer**: Can post, edit, close jobs and view applications
    - **Candidate**: Can browse, search, view jobs and apply

    ## Authentication
    All protected endpoints require a Bearer JWT token in the Authorization header.
    The JWT is issued by the shared auth layer and contains `id`, `role`, and `email`.
  version: 1.0.0
  contact:
    name: Jameela
servers:
  - url: http://localhost:3002
    description: Local development
  - url: https://your-ecs-url.amazonaws.com
    description: AWS ECS Production

components:
  securitySchemes:
    JWT:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateJobDto:
      type: object
      required: [title, description, requiredSkills, location, deadline]
      properties:
        title:
          type: string
          example: Senior Backend Engineer
        description:
          type: string
          example: We are looking for a skilled backend engineer...
        requiredSkills:
          type: array
          items:
            type: string
          example: ["Node.js", "PostgreSQL", "Docker"]
        salaryMin:
          type: number
          example: 80000
        salaryMax:
          type: number
          example: 120000
        salaryCurrency:
          type: string
          example: USD
        location:
          type: string
          example: Colombo, Sri Lanka
        isRemote:
          type: boolean
          example: true
        deadline:
          type: string
          format: date-time
          example: "2026-06-30T23:59:59.000Z"

    ApplyToJobDto:
      type: object
      required: [coverLetter, skills, experience, education]
      properties:
        coverLetter:
          type: string
          example: I am passionate about backend development...
        skills:
          type: array
          items:
            type: string
          example: ["Node.js", "REST APIs", "PostgreSQL"]
        experience:
          type: string
          example: 3 years at XYZ Corp as a backend developer...
        education:
          type: string
          example: BSc in Computer Science, University of Colombo
        resumeUrl:
          type: string
          example: https://drive.google.com/myresume.pdf
        portfolioUrl:
          type: string
          example: https://github.com/jameela

paths:
  # ── JOB ENDPOINTS ──────────────────────────────────────

  /jobs:
    get:
      summary: Browse all open job listings
      tags: [Jobs - Candidate]
      responses:
        '200':
          description: List of open jobs with company info attached

    post:
      summary: Post a new job listing
      tags: [Jobs - Employer]
      security:
        - JWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobDto'
      responses:
        '201':
          description: Job created successfully
        '403':
          description: Only employers can post jobs

  /jobs/search:
    get:
      summary: Search and filter open jobs
      tags: [Jobs - Candidate]
      parameters:
        - in: query
          name: title
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: skill
          schema:
            type: string
        - in: query
          name: salaryMin
          schema:
            type: number
        - in: query
          name: salaryMax
          schema:
            type: number
      responses:
        '200':
          description: Filtered list of jobs

  /jobs/my-jobs:
    get:
      summary: View all jobs posted by the logged-in employer
      tags: [Jobs - Employer]
      security:
        - JWT: []
      responses:
        '200':
          description: Employer's job listings with company info

  /jobs/{id}:
    get:
      summary: View full job details (includes company info)
      tags: [Jobs - Candidate]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full job details with company profile
        '404':
          description: Job not found

    patch:
      summary: Edit a job listing
      tags: [Jobs - Employer]
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job updated
        '403':
          description: Not the owner of this job

  /jobs/{id}/close:
    patch:
      summary: Close a job posting
      tags: [Jobs - Employer]
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job closed
        '403':
          description: Not the owner of this job

  /jobs/{id}/verify:
    get:
      summary: Verify if a job is open (called by Application Service)
      tags: [Jobs - Internal]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Returns isOpen boolean and job details

  # ── APPLICATION ENDPOINTS ──────────────────────────────

  /applications/jobs/{jobId}/apply:
    post:
      summary: Candidate applies to a job
      tags: [Applications - Candidate]
      security:
        - JWT: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyToJobDto'
      responses:
        '201':
          description: Application submitted
        '400':
          description: Job is closed
        '409':
          description: Already applied to this job

  /applications/my-applications:
    get:
      summary: Candidate views all their applications
      tags: [Applications - Candidate]
      security:
        - JWT: []
      responses:
        '200':
          description: List of applications with job details

  /applications/{id}/withdraw:
    patch:
      summary: Candidate withdraws a pending application
      tags: [Applications - Candidate]
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Application withdrawn
        '400':
          description: Cannot withdraw a non-pending application

  /applications/jobs/{jobId}:
    get:
      summary: Employer views all applications for their job
      tags: [Applications - Employer]
      security:
        - JWT: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of applications

  /applications/{id}:
    get:
      summary: Employer views a specific candidate's application/CV
      tags: [Applications - Employer]
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Application with full CV details
