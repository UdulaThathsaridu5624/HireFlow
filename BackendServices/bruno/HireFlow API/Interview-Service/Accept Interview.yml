info:
  name: Accept Interview
  type: http
  seq: 9

http:
  method: PATCH
  url: "{{interviewBaseUrl}}api/interviews/{{interviewId}}/accept"
  headers:
    - name: Authorization
      value: "Bearer {{Bearer_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
