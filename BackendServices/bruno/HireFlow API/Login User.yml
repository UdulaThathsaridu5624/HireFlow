info:
  name: Login User
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{loginEmail}}",
        "password": "{{loginPassword}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const body = res.getBody();
          if (body.token) bru.setVar("Bearer_token", body.token);
          if (body.refreshToken) bru.setVar("refreshToken", body.refreshToken);
          console.log("Token updated successfully");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
