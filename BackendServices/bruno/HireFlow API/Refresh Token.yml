info:
  name: Refresh Token
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}auth/refresh"
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refreshToken}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const body = res.getBody();
          if (body.token) bru.setVar("Bearer_token", body.token);
          if (body.refreshToken) bru.setVar("refreshToken", body.refreshToken);
          console.log("Tokens rotated successfully");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
